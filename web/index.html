<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local AI Support Suite</title>
  <style>
    body{font-family:Arial;background:#0b1020;color:#eef2ff;margin:0}
    .wrap{max-width:860px;margin:0 auto;padding:16px}
    .msg{padding:10px;border-radius:8px;margin:8px 0;white-space:pre-wrap}
    .u{background:#1d4ed8}.a{background:#172036}
    textarea{width:100%;height:90px;background:#0f172a;color:#fff;border:1px solid #334155;border-radius:8px;padding:10px}
    button{padding:10px 14px;border:0;border-radius:8px;background:#22c55e;color:#04130a;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Local AI Support Suite</h2>
    <label>Profile:
      <select id="profile" style="margin:0 0 10px 8px;padding:6px;border-radius:6px;background:#0f172a;color:#fff;border:1px solid #334155">
        <option value="smb">SMB Support</option>
        <option value="web3">Web3 Community</option>
        <option value="creator">Creator Ops</option>
      </select>
    </label>
    <div id="log"></div>
    <textarea id="input" placeholder="Ask a support question..."></textarea><br>
    <button onclick="sendMsg()">Send</button>
    <button onclick="requestHandoff()" style="background:#f59e0b;color:#1f1200;margin-left:8px">Request Human Handoff</button>
  </div>
  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const profile = document.getElementById('profile');
    const messages = [];
    function add(txt, cls){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=txt; log.appendChild(d); }
    async function sendMsg(){
      const t=input.value.trim(); if(!t) return; input.value='';
      messages.push({role:'user',content:t}); add('You: '+t,'u');
      add('Assistant is thinking...','a'); const ph=log.lastChild;
      const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages, profile: profile.value})});
      const j=await r.json();
      ph.textContent='Assistant: '+j.content;
      messages.push({role:'assistant',content:j.content});
    }

    async function requestHandoff(){
      const summary = prompt('Short issue summary for human handoff:','Need human support follow-up');
      if(summary === null) return;
      const contact = prompt('Customer contact (email/telegram/phone):','');
      const r=await fetch('/handoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:profile.value,summary,contact,messages})});
      const j=await r.json();
      if(j.sent){
        add('System: Human handoff request sent successfully.','a');
      }else if(j.requires_webhook){
        add('System: Handoff logged locally. Configure HANDOFF_WEBHOOK_URL to forward to Telegram/Email/Zapier.','a');
      }else{
        add('System: Handoff request failed to send to webhook.','a');
      }
    }
  </script>
</body>
</html>
